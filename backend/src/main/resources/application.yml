spring:
  application:
    name: parking-app-backend
  security:
    user:
      name: user
      password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb
    username: admin_viewer
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  output:
    ansi:
      enabled: always

server:
  port: 4000

logging:
  level:
    root: INFO
app:
  jwt:
    secret: a7c2bf97cb91d45e48e5e3fd9dfdcbae34435cc36700b7189126f3efd893e523
    expiration-ms: 86400000